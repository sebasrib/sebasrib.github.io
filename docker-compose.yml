services:
  site:
    image: jekyll/jekyll:pages
    working_dir: /srv/jekyll
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
    environment:
      PAGES_REPO_NWO: sebasrib/sebasrib.github.io
    command: >
      sh -lc '
      git config --global --add safe.directory /srv/jekyll &&
      if ! gem list -i webrick >/dev/null 2>&1; then gem install webrick --no-document >/dev/null; fi &&
      jekyll serve --host 0.0.0.0 --livereload --destination /tmp/_site
      '
    stdin_open: true
    tty: true
